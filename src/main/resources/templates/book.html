<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head><title>Danh sách sách</title></head>
<body>
<div layout:fragment="content" class="container">
    <div class="card shadow-sm rounded-4">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">📚 Danh sách sách hiện có</h4>
        </div>
        <div class="card-body p-4">
            <div class="d-flex justify-content-end mb-3">
                <a th:href="@{/add-book}" class="btn btn-success">➕ Thêm sách mới</a>
            </div>
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tiêu đề</th>
                        <th>Tác giả</th>
                        <th>Danh mục</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${books}">
                        <td th:text="${b.id}"></td>
                        <td th:text="${b.title}"></td>
                        <td th:text="${b.author}"></td>
                        <td th:text="${b.category != null ? b.category.name : 'Chưa phân loại'}" class="badge bg-info text-dark mt-2"></td>
                        <td>
                            <a th:href="@{/edit-book/{id}(id=${b.id})}" class="btn btn-warning btn-sm">✏️ Sửa</a>
                            <a th:href="@{/delete-confirm/{id}(id=${b.id})}" class="btn btn-danger btn-sm">🗑️ Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
