<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Thêm sách</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm rounded-4">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">➕ Thêm sách mới</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/add-book}" th:object="${book}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tiêu đề</label>
                            <input type="text" th:field="*{title}" class="form-control" placeholder="Nhập tên sách..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tác giả</label>
                            <input type="text" th:field="*{author}" class="form-control" placeholder="Tên tác giả..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Giá (VNĐ)</label>
                            <input type="number" th:field="*{price}" class="form-control" placeholder="Nhập giá sách..." step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Danh mục</label>
                            <select th:field="*{category}" class="form-select" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.name}"></option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <button type="submit" class="btn btn-success px-4">💾 Lưu sách</button>
                            <a th:href="@{/books}" class="btn btn-outline-secondary px-4">⬅️ Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
