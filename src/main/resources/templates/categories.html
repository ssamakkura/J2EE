<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Danh mục sản phẩm</title>
</head>
<body>
    <div layout:fragment="content" class="container mt-4">
        <div class="row align-items-center mb-3">
            <div class="col">
                <h2 class="fw-bold m-0"><i class="bi bi-tag-fill me-2"></i>Quản lý danh mục</h2>
            </div>
            <div class="col-auto">
                <a th:href="@{/add-category}" class="btn btn-primary d-flex align-items-center shadow-sm">
                    <i class="bi bi-plus-lg me-2"></i> Thêm danh mục mới
                </a>
            </div>
        </div>

        <div class="card shadow-sm border-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4"># ID</th>
                            <th>Tên danh mục</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category : ${categories}">
                            <td class="ps-4 fw-medium text-muted" th:text="${category.id}"></td>
                            <td class="fw-semibold text-dark" th:text="${category.name}"></td>
                            <td class="text-end pe-4">
                                <a th:href="@{'/edit-category/' + ${category.id}}" class="btn btn-sm btn-outline-info me-2 shadow-sm rounded-pill">
                                    <i class="bi bi-pencil-square me-1"></i> Sửa
                                </a>
                                <a th:href="@{'/delete-category/' + ${category.id}}" class="btn btn-sm btn-outline-danger shadow-sm rounded-pill" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                    <i class="bi bi-trash3 me-1"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="3" class="text-center py-5 text-muted">
                                <div class="mb-2"><i class="bi bi-inbox fs-1"></i></div>
                                Chưa có danh mục nào được tạo.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
