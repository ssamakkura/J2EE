<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">
<head><title>Giỏ hàng</title></head>
<body>
    <div layout:fragment="content" class="container">
        <div class="card shadow-sm rounded-4">
            <div class="card-header bg-info text-white text-center">
                <h4 class="mb-0">🛒 Giỏ hàng của bạn</h4>
            </div>
            <div class="card-body p-4">
                <table class="table table-hover align-middle text-center" th:if="${not #lists.isEmpty(items)}">
                    <thead class="table-light">
                        <tr>
                            <th>Tên sách</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.book.title}"></td>
                            <td th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            <td>
                                <form th:action="@{/cart/update}" method="post" class="d-flex justify-content-center">
                                    <input type="hidden" name="bookId" th:value="${item.book.id}">
                                    <input type="number" name="quantity" th:value="${item.quantity}" 
                                           class="form-control form-control-sm text-center" style="width: 70px;" min="1">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary ms-1">🔄</button>
                                </form>
                            </td>
                            <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(item.getTotalPrice(), 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            <td>
                                <a th:href="@{/cart/remove/{id}(id=${item.book.id})}" class="btn btn-danger btn-sm">🗑️ Xóa</a>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="table-active">
                            <td colspan="3" class="text-end fw-bold">Tổng cộng:</td>
                            <td colspan="2" class="text-center fw-bold fs-5 text-danger" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                        </tr>
                    </tfoot>
                </table>
                
                <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
                    <p class="fs-4 text-muted">Giỏ hàng đang trống.</p>
                    <a th:href="@{/books}" class="btn btn-primary mt-3">Tiếp tục mua sắm</a>
                </div>

                <div class="d-flex justify-content-between mt-4" th:if="${not #lists.isEmpty(items)}">
                    <a th:href="@{/books}" class="btn btn-outline-secondary">⬅️ Tiếp tục mua sắm</a>
                    <a th:href="@{/cart/checkout}" class="btn btn-success px-5 fw-bold">🚀 Tiến hành đặt hàng</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
