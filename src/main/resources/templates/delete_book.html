<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head><title>Xác nhận xóa</title></head>
<body>
<div layout:fragment="content" class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm rounded-4 text-center">
                <div class="card-header bg-danger text-white rounded-top-4">
                    <h4 class="mb-0">⚠️ Xác nhận xóa sách</h4>
                </div>
                <div class="card-body p-4">
                    <p class="fs-5 mb-3">
                        Bạn có chắc chắn muốn <strong class="text-danger">xóa</strong> sách này không?
                    </p>
                    <p class="mb-4">
                        ID sách:
                        <span class="fw-bold text-primary" th:text="${id}"></span>
                    </p>
                    <form th:action="@{'/delete-book/' + ${id}}" method="post">
                        <div class="d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-danger px-4">
                                🗑️ Đồng ý xóa
                            </button>
                            <a th:href="@{/books}" class="btn btn-outline-secondary px-4">
                                ❌ Hủy bỏ
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

</body>
</html>
