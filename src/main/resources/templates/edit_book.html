<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head><title>Chỉnh sửa sách</title></head>
<body>
<div layout:fragment="content" class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm rounded-4">
                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0">✏️ Chỉnh sửa sách</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/edit-book}" th:object="${book}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tiêu đề</label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tác giả</label>
                            <input type="text" th:field="*{author}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Danh mục</label>
                            <select th:field="*{category}" class="form-select" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.name}"
                                        th:selected="${book.category != null && cat.id == book.category.id}"></option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <button type="submit" class="btn btn-primary px-4">💾 Cập nhật</button>
                            <a th:href="@{/books}" class="btn btn-outline-secondary px-4">❌ Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
